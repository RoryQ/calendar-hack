<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Calendar Hack</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query string into arguments,
      // then redirects to the index.html page with these arguments as a query string.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + l.pathname.split('/').indexOf('calendar-hack')).join('/') + '/?p=/' +
        l.pathname.split('/').slice(1 + l.pathname.split('/').indexOf('calendar-hack')).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
